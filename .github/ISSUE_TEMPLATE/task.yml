name: Task
description: Plan scoped non-feature work, cleanup, maintenance, migration, investigation, or enablement.
title: "[Task]: "
labels:
  - type: task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be true when this task is complete?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add relevant background, links, constraints, or prior decisions.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and excluded?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should contributors verify this task?
    validations:
      required: false
